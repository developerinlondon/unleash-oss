# OSS e2e test configuration
# Uses our fork's Dockerfile instead of enterprise image
services:
  frontend:
    image: node:alpine
    working_dir: /app
    command: npx http-server ./build -p 80 --cors --proxy http://unleash:4242
    ports:
      - "3000:80"
    volumes:
      - ../frontend/build:/app:ro
    depends_on:
      unleash:
        condition: service_healthy
  unleash:
    build:
      context: ..
      dockerfile: Dockerfile
    expose:
      - "4242"
    environment:
      DATABASE_URL: "postgres://postgres:unleash@db/unleash"
      DATABASE_SSL: "false"
      LOG_LEVEL: "info"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:4242/health || exit 1
      interval: 1s
      timeout: 1m
      retries: 5
      start_period: 15s
  db:
    expose:
      - "5432"
    image: postgres:16
    environment:
      POSTGRES_DB: "unleash"
      POSTGRES_HOST_AUTH_METHOD: "trust"
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "--username=postgres",
          "--host=127.0.0.1",
          "--port=5432",
        ]
      interval: 2s
      timeout: 1m
      retries: 5
      start_period: 10s
